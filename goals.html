<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <title>Goals | Ledger</title>
</head>
<body>
    <main>
        <header class="header-top">
            <div>
                <h1 class="page-title">Goals</h1>
                <div class="subtitle">Cloud-Synced Savings Planner</div>
            </div>
            <a href="index.html" class="nav-link">← Ledger</a>
        </header>

        <button id="createGoalBtn" class="btn-outline wide-outline" type="button">+ Create New Target</button>

        <section id="goalsContainer">
            <p class="muted">Loading goals...</p>
        </section>
    </main>

    <section id="goalModal" class="modal hidden" aria-label="Goal editor">
        <div class="modal-content">
            <header class="modal-header">
                <h1 id="modalTitle">Setup Goal</h1>
                <button id="closeGoalModalBtn" class="close-btn" type="button" aria-label="Close goal editor">&times;</button>
            </header>

            <div class="input-line">
                <label for="inputName">Target Name</label>
                <input type="text" id="inputName" placeholder="e.g., India Trip" maxlength="60" autocomplete="off" data-validate="text">
            </div>

            <div class="input-line">
                <label for="inputAmt">Amount ($)</label>
                <input type="text" id="inputAmt" placeholder="$0" inputmode="decimal" maxlength="14" autocomplete="off" data-validate="money">
            </div>

            <div class="input-line">
                <label for="inputMonthly">Monthly Plan</label>
                <input type="text" id="inputMonthly" placeholder="Optional" inputmode="decimal" maxlength="14" autocomplete="off" data-validate="money">
            </div>

            <button id="saveGoalBtn" class="btn-primary" type="button">Save Target</button>
        </div>
    </section>

    <script type="module" src="goals.js"></script>
</body>
</html>
