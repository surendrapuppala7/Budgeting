<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Smart Advisor</title>

    <style>
        :root {
            --bg: #F5F4F0;
            --surface: #FFFFFF;
            --ink: #111111;
            --ink-light: #666666;
            --accent: #2B4C3B;
            --danger: #A63D2F;
            --border: #E2E0D8;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--ink-light);
            font-weight: 600;
            font-size: 14px;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .insight-card {
            background: var(--surface);
            padding: 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .insight-card h3 {
            margin-bottom: 8px;
            font-size: 16px;
            color: var(--danger);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .insight-card p {
            font-size: 14px;
            color: var(--ink-light);
            line-height: 1.5;
        }

        .insight-card.good h3 {
            color: var(--accent);
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .metric {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .metric span {
            display: block;
            color: var(--ink-light);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 6px;
        }

        .metric strong {
            font-size: 20px;
            font-weight: 800;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import {
            getFirestore,
            collection,
            query,
            where,
            getDocs,
            doc,
            getDoc,
            setDoc
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyYAuJLi67EdCu4FvIEr4QsKCgvlKWXrw",
            authDomain: "ledger-d3ec5.firebaseapp.com",
            projectId: "ledger-d3ec5",
            storageBucket: "ledger-d3ec5.firebasestorage.app",
            messagingSenderId: "1024737940441",
            appId: "1:1024737940441:web:670e3c2a660e989f5fffc8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function normalizeEmail(email) {
            return String(email || '').trim().toLowerCase();
        }

        function money(num) {
            return `$${Number(num || 0).toFixed(0)}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const householdId = await resolveHousehold(user);
                analyzeData(householdId);
            } catch (error) {
                console.error(error);
                document.getElementById('insights').innerHTML = `<p style="color: var(--ink-light);">Unable to load advisor: ${escapeHtml(error.message)}</p>`;
            }
        });

        async function resolveHousehold(user) {
            const email = normalizeEmail(user.email);
            const profileRef = doc(db, `userProfiles/${user.uid}`);
            const profileSnap = await getDoc(profileRef);

            if (profileSnap.exists() && profileSnap.data().activeHouseholdId) {
                return profileSnap.data().activeHouseholdId;
            }

            const householdsQuery = query(
                collection(db, 'households'),
                where('allowedEmails', 'array-contains', email)
            );

            const householdMatches = await getDocs(householdsQuery);

            if (!householdMatches.empty) {
                const householdId = householdMatches.docs[0].id;

                await setDoc(profileRef, {
                    email,
                    activeHouseholdId: householdId,
                    updatedAt: Date.now()
                }, { merge: true });

                return householdId;
            }

            window.location.href = 'index.html';
        }

        async function analyzeData(householdId) {
            const container = document.getElementById('insights');

            const settingsSnap = await getDoc(doc(db, `households/${householdId}/settings/data`));
            const txsSnap = await getDocs(collection(db, `households/${householdId}/transactions`));
            const goalsSnap = await getDocs(collection(db, `households/${householdId}/goals`));

            if (!settingsSnap.exists() || txsSnap.empty) {
                container.innerHTML = "<p style='color: var(--ink-light);'>Not enough data yet. Log some transactions to get insights.</p>";
                return;
            }

            const categories = settingsSnap.data().categories || [];
            const goals = [];

            goalsSnap.forEach(d => goals.push({ id: d.id, ...d.data() }));

            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

            let monthTxs = [];
            let allTxs = [];

            txsSnap.forEach(d => {
                const tx = d.data();
                allTxs.push(tx);

                if (Number(tx.timestamp || 0) >= startOfMonth) {
                    monthTxs.push(tx);
                }
            });

            const totalInc = monthTxs
                .filter(t => t.type === 'income')
                .reduce((s, t) => s + Number(t.amt || 0), 0);

            const totalExp = monthTxs
                .filter(t => t.type === 'expense')
                .reduce((s, t) => s + Number(t.amt || 0), 0);

            const totalSav = monthTxs
                .filter(t => t.type === 'savings')
                .reduce((s, t) => s + Number(t.amt || 0), 0);

            const available = totalInc - totalExp - totalSav;
            const allocationRate = totalInc > 0 ? ((totalExp + totalSav) / totalInc) * 100 : 0;

            let html = `
                <div class="metric-grid">
                    <div class="metric">
                        <span>Income</span>
                        <strong>${money(totalInc)}</strong>
                    </div>
                    <div class="metric">
                        <span>Spent</span>
                        <strong>${money(totalExp)}</strong>
                    </div>
                    <div class="metric">
                        <span>Saved</span>
                        <strong>${money(totalSav)}</strong>
                    </div>
                </div>
            `;

            if (available < 0) {
                html += `
                    <div class="insight-card">
                        <h3>⚠️ Negative Available Cash</h3>
                        <p>Your monthly available balance is ${money(available)}. That means expenses and savings are currently higher than income for this period. Reduce flexible spending or pause extra savings until cash flow is positive.</p>
                    </div>
                `;
            } else if (allocationRate > 90) {
                html += `
                    <div class="insight-card">
                        <h3>⚠️ Tight Cash Flow</h3>
                        <p>You have allocated ${allocationRate.toFixed(1)}% of monthly income toward expenses and savings. That is not automatically bad, but it leaves very little buffer for surprises.</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="insight-card good">
                        <h3>✅ Cash Flow Stable</h3>
                        <p>You still have ${money(available)} available this month after spending and savings. Keep watching flexible categories so this stays positive.</p>
                    </div>
                `;
            }

            if (totalSav > 0) {
                html += `
                    <div class="insight-card good">
                        <h3>🌱 Savings Momentum</h3>
                        <p>You moved ${money(totalSav)} into savings this month. That is the right behavior: savings should reduce spendable cash, but it should not be treated like wasteful spending.</p>
                    </div>
                `;
            }

            const expenseCategories = categories.filter(c => c.type === 'expense');

            expenseCategories.forEach(cat => {
                const spent = monthTxs
                    .filter(t => t.type === 'expense' && t.catId === cat.id)
                    .reduce((s, t) => s + Number(t.amt || 0), 0);

                const budget = Number(cat.budget || 0);

                if (budget > 0 && spent >= budget) {
                    html += `
                        <div class="insight-card">
                            <h3>🔥 Envelope Over Limit</h3>
                            <p>${escapeHtml(cat.name)} is at ${money(spent)} against a ${money(budget)} limit. This category needs attention before adding more discretionary spending.</p>
                        </div>
                    `;
                } else if (budget > 0 && spent >= budget * 0.8) {
                    html += `
                        <div class="insight-card">
                            <h3>⚠️ Envelope Near Limit</h3>
                            <p>${escapeHtml(cat.name)} has used ${money(spent)} of its ${money(budget)} monthly limit. You are above 80%, so this is worth watching.</p>
                        </div>
                    `;
                }
            });

            goals.forEach(goal => {
                const saved = allTxs
                    .filter(t => t.type === 'savings' && t.goalId === goal.id)
                    .reduce((s, t) => s + Number(t.amt || 0), 0);

                const target = Number(goal.amount || 0);
                const pct = target > 0 ? (saved / target) * 100 : 0;

                if (target > 0 && pct >= 100) {
                    html += `
                        <div class="insight-card good">
                            <h3>🏁 Goal Funded</h3>
                            <p>${escapeHtml(goal.name)} is fully funded at ${money(saved)}. Consider creating the next goal or moving extra cash into an emergency fund.</p>
                        </div>
                    `;
                } else if (target > 0 && pct > 0) {
                    html += `
                        <div class="insight-card good">
                            <h3>🎯 Goal Progress</h3>
                            <p>${escapeHtml(goal.name)} is ${pct.toFixed(1)}% funded. Current saved amount: ${money(saved)} of ${money(target)}.</p>
                        </div>
                    `;
                }
            });

            if (!html.includes('Envelope') && totalSav === 0 && available >= 0) {
                html += `
                    <div class="insight-card good">
                        <h3>✅ System Nominal</h3>
                        <p>No major category warnings found. The next improvement would be logging consistent savings toward your highest-priority goal.</p>
                    </div>
                `;
            }

            container.innerHTML = html;
        }
    </script>
</head>

<body>
    <div class="header">
        <h1>Advisor</h1>
        <a href="index.html" class="back-btn">← Back to Ledger</a>
    </div>

    <div id="insights">
        <p style="color: var(--ink-light);">Running analytics engine...</p>
    </div>
</body>
</html>
