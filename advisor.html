<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <title>Smart Advisor</title>
    <style>
        :root { --bg: #F5F4F0; --surface: #FFFFFF; --ink: #111111; --ink-light: #666666; --accent: #2B4C3B; --danger: #A63D2F; --border: #E2E0D8; --radius: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg); color: var(--ink); max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .back-btn { text-decoration: none; color: var(--ink-light); font-weight: 600; font-size: 14px; }
        h1 { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
        .insight-card { background: var(--surface); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 16px; }
        .insight-card h3 { margin-bottom: 8px; font-size: 16px; color: var(--danger); display: flex; align-items: center; gap: 8px; }
        .insight-card p { font-size: 14px; color: var(--ink-light); line-height: 1.5; }
        .insight-card.good h3 { color: var(--accent); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCyYAuJLi67EdCu4FvIEr4QsKCgvlKWXrw",
            authDomain: "ledger-d3ec5.firebaseapp.com",
            projectId: "ledger-d3ec5",
            storageBucket: "ledger-d3ec5.firebasestorage.app",
            messagingSenderId: "1024737940441",
            appId: "1:1024737940441:web:670e3c2a660e989f5fffc8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                analyzeData(user.uid);
            } else {
                window.location.href = 'index.html';
            }
        });

        async function analyzeData(uid) {
            const container = document.getElementById('insights');
            const settingsSnap = await getDoc(doc(db, `users/${uid}/settings/data`));
            const txsSnap = await getDocs(collection(db, `users/${uid}/transactions`));
            
            if (!settingsSnap.exists() || txsSnap.empty) {
                container.innerHTML = "<p>Not enough data yet. Log some transactions to get insights!</p>";
                return;
            }

            const categories = settingsSnap.data().categories || [];
            let html = "";
            const now = new Date();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            
            let monthTxs = [];
            txsSnap.forEach(d => { if(d.data().timestamp >= startOfMonth) monthTxs.push(d.data()); });

            const totalExp = monthTxs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);

            // Dining Check
            const diningCat = categories.find(c => c.name.includes('Dining') || c.name.includes('Food'));
            if (diningCat) {
                const spent = monthTxs.filter(t => t.catId === diningCat.id).reduce((s, t) => s + t.amt, 0);
                if (spent > diningCat.budget * 0.8) {
                    html += `<div class="insight-card"><h3>⚠️ High Burn: Dining</h3><p>You have spent $${spent.toFixed(0)} on dining out this month. Try cooking the next 3 meals at home to stay under your limit.</p></div>`;
                }
            }

            // Tech & Home Lab Check
            const techCat = categories.find(c => c.name.includes('Tech') || c.name.includes('Lab'));
            if (techCat) {
                const spent = monthTxs.filter(t => t.catId === techCat.id).reduce((s, t) => s + t.amt, 0);
                if (spent > techCat.budget) {
                    html += `<div class="insight-card"><h3>🔌 Energy Overrun: Infrastructure</h3><p>Your tech and home lab spending is running hot at $${spent.toFixed(0)}. Consider spinning down non-critical Proxmox VMs or checking Docker container utilization to drop the server wattage footprint.</p></div>`;
                }
            }

            // Auto & EV Check
            const autoCat = categories.find(c => c.name.includes('Auto') || c.name.includes('EV'));
            if (autoCat) {
                const spent = monthTxs.filter(t => t.catId === autoCat.id).reduce((s, t) => s + t.amt, 0);
                if (spent > autoCat.budget) {
                    html += `<div class="insight-card"><h3>🔋 Fleet Efficiency Warning</h3><p>Auto costs hit $${spent.toFixed(0)}. Double-check that your charging schedule is strictly locked to off-peak hours to maximize efficiency.</p></div>`;
                }
            }

            // Pet Check
            const petCat = categories.find(c => c.name.includes('Pet') || c.name.includes('Piper'));
            if (petCat) {
                const spent = monthTxs.filter(t => t.catId === petCat.id).reduce((s, t) => s + t.amt, 0);
                if (spent > petCat.budget) {
                    html += `<div class="insight-card"><h3>🦴 Pet Care Alert</h3><p>Piper's care envelope is trending high ($${spent.toFixed(0)}). Review recurring toy or treat subscriptions this month.</p></div>`;
                }
            }

            if(html === "") {
                html = `<div class="insight-card good"><h3>✅ System Nominal</h3><p>All categories are currently operating within defined thresholds. Excellent job managing your burn rate.</p></div>`;
            }

            container.innerHTML = html;
        }
    </script>
</head>
<body>
    <div class="header">
        <h1>Advisor</h1>
        <a href="index.html" class="back-btn">← Back to Ledger</a>
    </div>
    <div id="insights">
        <p style="color: var(--ink-light);">Running analytics engine...</p>
    </div>
</body>
</html>
