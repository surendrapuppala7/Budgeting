<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <title>Ledger Cloud</title>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay hidden">Loading Ledger...</div>

    <main id="loginScreen" class="login-screen">
        <h1 class="login-title">Ledger</h1>
        <p class="small-muted login-subtitle">Private household budgeting with savings goals.</p>
        <button id="loginBtn" class="btn-primary login-btn" type="button">Sign in with Google</button>
    </main>

    <main id="appScreen" class="hidden">
        <header class="header-top">
            <div>
                <h1 class="page-title">Ledger</h1>
                <div id="householdBadge" class="small-muted"></div>
            </div>

            <nav class="nav-links" aria-label="Primary navigation">
                <a href="goals.html" class="nav-link">Goals</a>
                <a href="advisor.html" class="nav-link">Advisor</a>
                <button id="logoutBtn" class="nav-link nav-button danger-text" type="button">Log Out</button>
            </nav>
        </header>

        <section class="filter-row" aria-label="Time filter">
            <select id="timeFilter" class="filter-select">
                <option value="month">This Month</option>
                <option value="all">All Time</option>
            </select>
        </section>

        <section class="dashboard" aria-label="Budget dashboard">
            <div class="donut-wrapper" aria-hidden="true">
                <div id="expensePie" class="donut-chart"></div>
                <div class="donut-hole">
                    <span>Available</span>
                    <strong id="lblBalance">$0</strong>
                </div>
            </div>

            <div class="correlation-box">
                <div class="corr-header">
                    <span class="muted-label">Income Allocated</span>
                    <span id="lblCorrPct">0%</span>
                </div>

                <div class="corr-track">
                    <div id="corrBar" class="corr-fill"></div>
                </div>

                <div class="mini-totals">
                    <span>In <strong id="lblTotalIn">$0</strong></span>
                    <span>Out <strong id="lblTotalOut">$0</strong></span>
                    <span>Saved <strong id="lblTotalSaved">$0</strong></span>
                </div>
            </div>
        </section>

        <section class="form-area" aria-label="Log transaction">
            <div class="type-toggle" role="tablist" aria-label="Transaction type">
                <button id="btnExpense" class="toggle-btn active" type="button" data-type="expense">Expense</button>
                <button id="btnIncome" class="toggle-btn" type="button" data-type="income">Income</button>
                <button id="btnSavings" class="toggle-btn" type="button" data-type="savings">Savings</button>
            </div>

            <div id="quickTags" class="tags-container" aria-label="Quick expense categories"></div>

            <div class="input-line">
                <label for="amtInput">Amount</label>
                <input type="number" id="amtInput" placeholder="0.00" step="0.01" inputmode="decimal" min="0.01" max="1000000">
            </div>

            <div class="input-line">
                <label for="noteInput">Note</label>
                <input type="text" id="noteInput" placeholder="What was it for?" maxlength="120" autocomplete="off">
            </div>

            <div id="catRow" class="input-line">
                <label id="catLabel" for="catInput">Envelope</label>
                <select id="catInput" dir="rtl"></select>
            </div>

            <div id="goalRow" class="input-line hidden">
                <label for="goalInput">Goal</label>
                <select id="goalInput" dir="rtl"></select>
            </div>

            <div id="walletRow" class="input-line">
                <label for="walletInput">Wallet</label>
                <select id="walletInput" dir="rtl"></select>
            </div>

            <button id="saveTxBtn" class="btn-primary" type="button">Log Transaction</button>
        </section>

        <section>
            <div class="section-heading-row">
                <h2>Breakdown</h2>
                <button id="openSetupBtn" class="btn-outline" type="button">Edit Setup</button>
            </div>
            <div id="envList" class="list-wrap"></div>
        </section>

        <section>
            <h2>Savings Goals</h2>
            <div id="savingsList" class="list-wrap"></div>
        </section>

        <section>
            <h2>Activity</h2>
            <div id="txList" class="list-wrap activity-list"></div>
        </section>
    </main>

    <section id="categoryModal" class="modal hidden" aria-label="Setup panel">
        <div class="modal-content">
            <header class="modal-header">
                <h1>Setup</h1>
                <button id="closeSetupBtn" class="close-btn" type="button" aria-label="Close setup">&times;</button>
            </header>

            <div class="form-area">
                <div class="type-toggle setup-toggle" role="tablist" aria-label="Setup type">
                    <button id="modalBtnExpense" class="toggle-btn active" type="button" data-tab="expense">Exp.</button>
                    <button id="modalBtnIncome" class="toggle-btn" type="button" data-tab="income">Inc.</button>
                    <button id="modalBtnWallet" class="toggle-btn" type="button" data-tab="wallet">Wallet</button>
                    <button id="modalBtnRecurring" class="toggle-btn" type="button" data-tab="recurring">Auto</button>
                    <button id="modalBtnHousehold" class="toggle-btn" type="button" data-tab="household">Home</button>
                </div>

                <p id="householdHelp" class="small-muted hidden">
                    Add the exact Google email address of the person you want to share this ledger with.
                </p>

                <div id="modalNameRow" class="input-line">
                    <label id="modalNameLabel" for="newCatName">Name</label>
                    <input type="text" id="newCatName" placeholder="e.g., Groceries" maxlength="80" autocomplete="off">
                </div>

                <div id="modalBudgetRow" class="input-line">
                    <label for="newCatBudget">Limit</label>
                    <input type="number" id="newCatBudget" placeholder="0.00" inputmode="decimal" min="0" max="1000000">
                </div>

                <div id="modalRecurringInputs" class="hidden">
                    <div class="input-line">
                        <label for="recAmt">Amount</label>
                        <input type="number" id="recAmt" placeholder="0.00" inputmode="decimal" min="0.01" max="1000000">
                    </div>

                    <div class="input-line">
                        <label for="recType">Type</label>
                        <select id="recType" dir="rtl">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                            <option value="savings">Savings</option>
                        </select>
                    </div>

                    <div id="recCatRow" class="input-line">
                        <label for="recCat">Category</label>
                        <select id="recCat" dir="rtl"></select>
                    </div>

                    <div id="recGoalRow" class="input-line hidden">
                        <label for="recGoal">Goal</label>
                        <select id="recGoal" dir="rtl"></select>
                    </div>

                    <div class="input-line">
                        <label for="recInterval">Every X Days</label>
                        <input type="number" id="recInterval" value="14" inputmode="numeric" min="1" max="365">
                    </div>
                </div>

                <div class="button-row">
                    <button id="saveSetupBtn" class="btn-primary no-margin" type="button">Save Item</button>
                    <button id="cancelEditBtn" class="btn-outline hidden" type="button">Cancel</button>
                </div>
            </div>

            <h2 id="modalListTitle">Current Items</h2>
            <div id="modalSetupList" class="list-wrap modal-list"></div>
        </div>
    </section>

    <script type="module" src="app.js"></script>
</body>
</html>
