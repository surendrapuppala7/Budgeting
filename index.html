<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ledger</title>
    <style>
        /* Boutique Minimalist Theme */
        :root {
            --bg: #F5F4F0; --surface: #FFFFFF; --ink: #111111; --ink-light: #666666;
            --accent: #2B4C3B; --danger: #A63D2F; --border: #E2E0D8; --radius: 16px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; }
        body { background-color: var(--bg); color: var(--ink); padding: env(safe-area-inset-top) 20px 20px 100px; -webkit-font-smoothing: antialiased; }
        
        h1 { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 24px; }
        h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-light); margin-bottom: 16px; margin-top: 32px;}
        h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--ink-light); margin-bottom: 12px; margin-top: 24px;}
        
        .header-top { display: flex; justify-content: space-between; align-items: baseline; }
        .nav-links { display: flex; gap: 16px; }
        .nav-link { color: var(--ink-light); text-decoration: none; font-size: 14px; font-weight: 500; border-bottom: 1px solid var(--ink-light); padding-bottom: 2px;}

        /* Dashboard */
        .dashboard { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .donut-wrapper { position: relative; width: 200px; height: 200px; margin-bottom: 24px; }
        .donut-chart { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#E2E0D8 0%); transition: background 0.4s ease-out; box-shadow: inset 0 0 0 4px var(--bg); }
        .donut-hole { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140px; height: 140px; background: var(--bg); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .donut-hole span { font-size: 11px; font-weight: 600; color: var(--ink-light); text-transform: uppercase; letter-spacing: 1px; }
        .donut-hole strong { font-size: 28px; font-weight: 800; letter-spacing: -1px; color: var(--ink); margin: 4px 0; }
        .donut-hole .net-label { font-size: 12px; color: var(--accent); font-weight: 600;}
        .donut-hole .net-label.negative { color: var(--danger); }

        .correlation-box { width: 100%; background: var(--surface); padding: 16px 20px; border-radius: var(--radius); border: 1px solid var(--border); }
        .corr-header { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
        .corr-track { background: var(--bg); height: 6px; border-radius: 3px; overflow: hidden; width: 100%; }
        .corr-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .corr-fill.danger { background: var(--danger); }

        /* Form Controls */
        .type-toggle { display: flex; background: #EAE8E1; border-radius: 100px; padding: 4px; margin-bottom: 20px; width: 100%; }
        .toggle-btn { flex: 1; text-align: center; padding: 10px 0; border-radius: 100px; font-size: 14px; font-weight: 600; color: var(--ink-light); cursor: pointer; transition: all 0.2s ease; }
        .toggle-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        .form-area { margin-bottom: 32px; }
        .input-line { display: flex; align-items: center; border-bottom: 1.5px solid var(--border); padding: 12px 0; }
        .input-line label { width: 90px; font-size: 14px; font-weight: 600; color: var(--ink-light); }
        .input-line input, .input-line select { flex: 1; border: none; background: transparent; font-size: 18px; color: var(--ink); outline: none; -webkit-appearance: none; }
        .input-line input[type="number"] { font-size: 24px; font-weight: 700; }
        
        .btn-primary { display: block; width: 100%; background: var(--ink); color: var(--surface); text-align: center; padding: 18px; border-radius: 100px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; margin-top: 24px; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--ink); padding: 8px 16px; border-radius: 100px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        .tags-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 8px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .tags-container::-webkit-scrollbar { display: none; }
        .tag { background: var(--surface); border: 1px solid var(--border); color: var(--ink); padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer; }

        /* Lists */
        .list-wrap { background: var(--surface); border-radius: var(--radius); padding: 0 20px; }
        .list-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .list-row:last-child { border-bottom: none; }
        
        .env-name { font-size: 15px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;}
        .color-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .env-track { background: var(--bg); height: 4px; border-radius: 2px; overflow: hidden; width: 100%; }
        .env-fill { height: 100%; background: var(--ink); }
        .env-stats { text-align: right; font-size: 13px; font-weight: 500; color: var(--ink-light); }
        
        .tx-desc { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
        .tx-meta { font-size: 12px; color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.5px; }
        .tx-amt { font-size: 16px; font-weight: 600; }
        .tx-amt.income { color: var(--accent); }
        
        .action-btns { display: flex; align-items: center; gap: 16px; }
        .edit-btn { color: var(--ink-light); background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px; }
        .del-btn { color: var(--danger); background: none; border: none; font-size: 20px; padding: 4px; cursor: pointer;}

        #categoryModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: env(safe-area-inset-top) 20px 20px 100px; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .close-btn { background: none; border: none; font-size: 32px; font-weight: 300; cursor: pointer; color: var(--ink); }
    </style>
</head>
<body>

    <div class="header-top">
        <h1>Ledger</h1>
        <div class="nav-links">
            <a href="goals.html" class="nav-link">Goals</a>
            <a href="advisor.html" class="nav-link">Advisor</a>
        </div>
    </div>

    <div class="dashboard">
        <div class="donut-wrapper">
            <div class="donut-chart" id="expensePie"></div>
            <div class="donut-hole">
                <span>Available</span>
                <strong id="lblBalance">$0</strong>
                <div class="net-label" id="lblNetStatus">On Track</div>
            </div>
        </div>

        <div class="correlation-box">
            <div class="corr-header">
                <span style="color: var(--ink-light);">Income Spent</span>
                <span id="lblCorrPct">0%</span>
            </div>
            <div class="corr-track"><div class="corr-fill" id="corrBar"></div></div>
            <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--ink-light);">
                <span>In: <strong style="color: var(--ink);" id="lblTotalIn">$0</strong></span>
                <span>Out: <strong style="color: var(--ink);" id="lblTotalOut">$0</strong></span>
            </div>
        </div>
    </div>

    <div class="form-area">
        <div class="type-toggle">
            <div class="toggle-btn active" id="btnExpense" onclick="setType('expense')">Expense</div>
            <div class="toggle-btn" id="btnIncome" onclick="setType('income')">Income</div>
        </div>

        <div class="tags-container" id="quickTags"></div>

        <div class="input-line">
            <label>Amount</label>
            <input type="number" id="amtInput" placeholder="0.00" step="0.01" inputmode="decimal">
        </div>
        <div class="input-line">
            <label>Note</label>
            <input type="text" id="noteInput" placeholder="What was it for?">
        </div>
        <div class="input-line">
            <label id="catLabel">Envelope</label>
            <select id="catInput"></select>
        </div>
        <div class="input-line">
            <label>Wallet</label>
            <select id="walletInput">
                <option value="Checking">Checking Account</option>
                <option value="Chase">Chase Card</option>
                <option value="Discover">Discover Card</option>
                <option value="Citi">Citi Card</option>
            </select>
        </div>
        
        <button class="btn-primary" onclick="saveTx()">Log Transaction</button>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: baseline;">
        <h2>Breakdown</h2>
        <button class="btn-outline" onclick="openCatModal()">Edit Setup</button>
    </div>
    <div class="list-wrap" id="envList"></div>

    <h2>Activity</h2>
    <div class="list-wrap" id="txList"></div>

    <div id="categoryModal">
        <div class="modal-header">
            <h1>Ledger Setup</h1>
            <button class="close-btn" onclick="closeCatModal()">&times;</button>
        </div>
        <div class="form-area">
            <div class="type-toggle">
                <div class="toggle-btn active" id="modalBtnExpense" onclick="setModalType('expense')">Expense</div>
                <div class="toggle-btn" id="modalBtnIncome" onclick="setModalType('income')">Income</div>
            </div>
            <div class="input-line">
                <label>Name</label>
                <input type="text" id="newCatName" placeholder="e.g., Target Runs">
            </div>
            <div class="input-line" id="modalBudgetRow">
                <label>Limit</label>
                <input type="number" id="newCatBudget" placeholder="0.00" inputmode="decimal">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button class="btn-primary" id="saveCatBtn" onclick="saveCategory()" style="margin-top: 0; flex: 2;">Save</button>
                <button class="btn-outline" id="cancelEditBtn" onclick="cancelEdit()" style="display: none; flex: 1;">Cancel</button>
            </div>
        </div>
        <h2>Current Categories</h2>
        <h3>Income Sources</h3>
        <div class="list-wrap" id="modalIncList"></div>
        <h3>Expense Envelopes</h3>
        <div class="list-wrap" id="modalExpList" style="margin-bottom: 60px;"></div>
    </div>

    <script>
        // Full script logic maintained from previous version, adding Wallet support
        const palette = ['#111111', '#A63D2F', '#D99A5A', '#C2847A', '#7A8B76', '#4A5D4E', '#2B4C3B', '#8E8E93'];
        let transactions = JSON.parse(localStorage.getItem('bdgt_txs')) || [];
        let categories = JSON.parse(localStorage.getItem('bdgt_cats')) || [];
        
        if (categories.length === 0) {
            categories = [
                { id: 'i_salary', name: 'Primary Salary', type: 'income', color: '#2B4C3B' },
                { id: 'e_mortgage', name: 'Mortgage & Utilities', type: 'expense', budget: 2500, color: '#111111' },
                { id: 'e_auto', name: 'EV Charging & Auto', type: 'expense', budget: 150, color: '#A63D2F' },
                { id: 'e_food', name: 'Dining Out', type: 'expense', budget: 350, color: '#C2847A' }
            ];
        }

        let type = 'expense';
        let modalType = 'expense';
        let editingCatId = null;

        function init() { refreshCatDropdown(); renderUI(); }

        function setType(t) {
            type = t;
            document.getElementById('btnExpense').classList.toggle('active', t === 'expense');
            document.getElementById('btnIncome').classList.toggle('active', t === 'income');
            document.getElementById('catLabel').textContent = t === 'income' ? 'Source' : 'Envelope';
            document.getElementById('quickTags').style.display = t === 'income' ? 'none' : 'flex';
            
            // Hide wallet selector if logging income
            document.getElementById('walletInput').parentElement.style.display = t === 'income' ? 'none' : 'flex';
            refreshCatDropdown();
        }

        function quickFill(catId) {
            setType('expense');
            document.getElementById('catInput').value = catId;
            document.getElementById('amtInput').focus();
        }

        function saveTx() {
            const amt = parseFloat(document.getElementById('amtInput').value);
            const note = document.getElementById('noteInput').value.trim();
            const catId = document.getElementById('catInput').value;
            const wallet = type === 'income' ? 'Direct Deposit' : document.getElementById('walletInput').value;

            if (!amt || !note) return alert('Amount and note required.');

            transactions.unshift({
                id: Date.now().toString(), type, amt, note, catId, wallet,
                date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
            });

            sync(); renderUI();
            document.getElementById('amtInput').value = '';
            document.getElementById('noteInput').value = '';
            document.activeElement.blur();
        }

        function delTx(id) { transactions = transactions.filter(t => t.id !== id); sync(); renderUI(); }

        // Modal Functions
        function openCatModal() { document.getElementById('categoryModal').style.display = 'block'; renderModalCats(); }
        function closeCatModal() { document.getElementById('categoryModal').style.display = 'none'; cancelEdit(); }
        function setModalType(t) { modalType = t; document.getElementById('modalBtnExpense').classList.toggle('active', t === 'expense'); document.getElementById('modalBtnIncome').classList.toggle('active', t === 'income'); document.getElementById('modalBudgetRow').style.display = t === 'income' ? 'none' : 'flex'; }
        function editCategory(id) { const cat = categories.find(c => c.id === id); if (!cat) return; editingCatId = id; setModalType(cat.type); document.getElementById('newCatName').value = cat.name; if (cat.type === 'expense') document.getElementById('newCatBudget').value = cat.budget; document.getElementById('saveCatBtn').textContent = 'Update'; document.getElementById('cancelEditBtn').style.display = 'inline-flex'; document.getElementById('categoryModal').scrollTo({ top: 0, behavior: 'smooth' }); }
        function cancelEdit() { editingCatId = null; document.getElementById('newCatName').value = ''; document.getElementById('newCatBudget').value = ''; document.getElementById('saveCatBtn').textContent = 'Save'; document.getElementById('cancelEditBtn').style.display = 'none'; setModalType('expense'); }
        function saveCategory() { const name = document.getElementById('newCatName').value.trim(); const budget = parseFloat(document.getElementById('newCatBudget').value); if (!name || (modalType === 'expense' && isNaN(budget))) return alert('Missing fields.'); if (editingCatId) { const cat = categories.find(c => c.id === editingCatId); if (cat) { cat.name = name; cat.type = modalType; cat.budget = modalType === 'expense' ? budget : 0; } } else { categories.push({ id: (modalType === 'expense' ? 'e_' : 'i_') + Date.now(), name, type: modalType, budget: modalType === 'expense' ? budget : 0, color: palette[categories.length % palette.length] }); } sync(); refreshCatDropdown(); renderModalCats(); renderUI(); cancelEdit(); }
        function delCategory(id) { if(confirm("Delete this?")) { categories = categories.filter(c => c.id !== id); if (editingCatId === id) cancelEdit(); sync(); refreshCatDropdown(); renderModalCats(); renderUI(); } }

        // Renders
        function sync() { localStorage.setItem('bdgt_txs', JSON.stringify(transactions)); localStorage.setItem('bdgt_cats', JSON.stringify(categories)); }
        function refreshCatDropdown() { const select = document.getElementById('catInput'); select.innerHTML = ''; categories.filter(c => c.type === type).forEach(c => { select.innerHTML += `<option value="${c.id}">${c.name}</option>`; }); }
        
        function renderModalCats() {
            document.getElementById('modalIncList').innerHTML = categories.filter(c => c.type === 'income').map(c => `<div class="list-row"><div><div class="env-name"><span class="color-dot" style="background:${c.color}"></span> ${c.name}</div></div><div class="action-btns"><button class="edit-btn" onclick="editCategory('${c.id}')">✎</button><button class="del-btn" onclick="delCategory('${c.id}')">&times;</button></div></div>`).join('') || '<div style="padding: 16px 0; color: var(--ink-light); font-size: 14px;">No sources.</div>';
            document.getElementById('modalExpList').innerHTML = categories.filter(c => c.type === 'expense').map(c => `<div class="list-row"><div><div class="env-name"><span class="color-dot" style="background:${c.color}"></span> ${c.name}</div><div class="tx-meta">Budget: $${c.budget}</div></div><div class="action-btns"><button class="edit-btn" onclick="editCategory('${c.id}')">✎</button><button class="del-btn" onclick="delCategory('${c.id}')">&times;</button></div></div>`).join('') || '<div style="padding: 16px 0; color: var(--ink-light); font-size: 14px;">No envelopes.</div>';
        }

        function renderUI() {
            const totalInc = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amt, 0);
            const totalExp = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amt, 0);
            document.getElementById('lblBalance').textContent = `$${(totalInc - totalExp).toFixed(0)}`;
            document.getElementById('lblTotalIn').textContent = `$${totalInc.toFixed(0)}`;
            document.getElementById('lblTotalOut').textContent = `$${totalExp.toFixed(0)}`;

            const corrPct = totalInc > 0 ? Math.min((totalExp / totalInc) * 100, 100) : 0;
            document.getElementById('lblCorrPct').textContent = `${corrPct.toFixed(1)}%`;
            document.getElementById('corrBar').style.width = `${corrPct}%`;

            let gradientStr = ''; let currentPct = 0;
            const expCats = categories.filter(c => c.type === 'expense');
            expCats.forEach(cat => { const spent = transactions.filter(t => t.catId === cat.id && t.type === 'expense').reduce((s, t) => s + t.amt, 0); if (spent > 0 && totalExp > 0) { const slicePct = (spent / totalExp) * 100; gradientStr += `${cat.color} ${currentPct}% ${currentPct + slicePct}%, `; currentPct += slicePct; } });
            document.getElementById('expensePie').style.background = (totalExp === 0 || gradientStr === '') ? 'conic-gradient(#E2E0D8 0%)' : `conic-gradient(${gradientStr.slice(0, -2)})`;

            document.getElementById('quickTags').innerHTML = expCats.slice(0, 6).map(c => `<button class="tag" onclick="quickFill('${c.id}')">${c.name}</button>`).join('');

            document.getElementById('envList').innerHTML = expCats.map(cat => { const spent = transactions.filter(t => t.catId === cat.id && t.type === 'expense').reduce((s, t) => s + t.amt, 0); const pct = cat.budget > 0 ? Math.min((spent / cat.budget) * 100, 100) : 0; return `<div class="list-row"><div style="flex:1; padding-right: 20px;"><div class="env-name"><span class="color-dot" style="background:${cat.color}"></span> ${cat.name}</div><div class="env-track"><div class="env-fill" style="width: ${pct}%; background:${cat.color}"></div></div></div><div class="env-stats">$${spent.toFixed(0)} / $${cat.budget}</div></div>`; }).join('');

            // Added wallet badge to transactions
            document.getElementById('txList').innerHTML = transactions.length ? transactions.map(t => { const cat = categories.find(c => c.id === t.catId); const isInc = t.type === 'income'; return `<div class="list-row"><div><div class="tx-desc">${t.note}</div><div class="tx-meta">${t.date} • ${cat ? cat.name : 'Uncategorized'} <span style="background: #EAE8E1; padding: 2px 6px; border-radius: 4px; margin-left: 4px; font-weight: 600;">${t.wallet || 'Cash'}</span></div></div><div style="display: flex; align-items: center;"><div class="tx-amt ${isInc ? 'income' : ''}">${isInc ? '+' : '-'}$${t.amt.toFixed(2)}</div><button class="del-btn" onclick="delTx('${t.id}')">&times;</button></div></div>`; }).join('') : '<div style="padding: 20px 0; color: var(--ink-light);">No activity.</div>';
        }
        init();
    </script>
</body>
</html>
